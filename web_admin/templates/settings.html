<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>系统设置 - 自动化交易生存指南-量化交易系统</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f1419;
            color: #e0e0e0;
            min-height: 100vh;
            padding-top: 130px;
        }
        
        .header {
            background: linear-gradient(135deg, #1a1f2e 0%, #2d3748 100%);
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
        }
        
        .header h1 {
            font-size: 24px;
            color: #4fd1c5;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .connection-status {
            padding: 8px 16px;
            background: rgba(45, 55, 72, 0.8);
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
        }
        
        .nav {
            display: flex;
            gap: 20px;
            margin-top: 15px;
        }
        
        .nav a {
            color: #a0aec0;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 6px;
            transition: all 0.3s;
        }
        
        .nav a:hover, .nav a.active {
            background: #4fd1c5;
            color: #1a1f2e;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .card {
            background: #1a1f2e;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            border: 1px solid #2d3748;
            margin-bottom: 20px;
        }
        
        .card h3 {
            color: #4fd1c5;
            margin-bottom: 20px;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #a0aec0;
            font-size: 14px;
        }
        
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 15px;
            background: #0d1117;
            border: 1px solid #2d3748;
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #4fd1c5;
        }
        
        .form-group input::placeholder {
            color: #4a5568;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: #4fd1c5;
            color: #1a1f2e;
        }
        
        .btn-primary:hover {
            background: #38b2ac;
        }
        
        .btn-secondary {
            background: #2d3748;
            color: #e0e0e0;
            margin-left: 10px;
        }
        
        .btn-secondary:hover {
            background: #4a5568;
        }
        
        .btn-danger {
            background: #f56565;
            color: white;
        }
        
        .btn-danger:hover {
            background: #e53e3e;
        }
        
        .section-divider {
            height: 1px;
            background: #2d3748;
            margin: 30px 0;
        }
        
        .alert {
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        
        .alert-success {
            background: rgba(72, 187, 120, 0.1);
            border: 1px solid #48bb78;
            color: #48bb78;
        }
        
        .alert-error {
            background: rgba(245, 101, 101, 0.1);
            border: 1px solid #f56565;
            color: #f56565;
        }
        
        .toggle-switch {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .toggle-switch input[type="checkbox"] {
            width: 50px;
            height: 26px;
            appearance: none;
            background: #2d3748;
            border-radius: 13px;
            position: relative;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .toggle-switch input[type="checkbox"]::after {
            content: '';
            position: absolute;
            width: 22px;
            height: 22px;
            background: #fff;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: transform 0.3s;
        }
        
        .toggle-switch input[type="checkbox"]:checked {
            background: #4fd1c5;
        }
        
        .toggle-switch input[type="checkbox"]:checked::after {
            transform: translateX(24px);
        }
        
        .info-text {
            font-size: 12px;
            color: #6b7280;
            margin-top: 5px;
        }
        
        .danger-zone {
            border: 1px solid #f56565;
            background: rgba(245, 101, 101, 0.05);
        }
        
        .danger-zone h3 {
            color: #f56565;
        }

        .provider-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
        }

        .provider-card {
            background: #0d1117;
            border: 1px solid #2d3748;
            border-radius: 10px;
            padding: 15px;
        }

        .provider-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .provider-title strong {
            color: #4fd1c5;
        }

        .provider-status {
            font-size: 12px;
            color: #a0aec0;
        }

        .provider-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-top">
            <h1>📈 自动化交易生存指南-量化交易系统<V1 class="0">v1.0</V1></h1>
            <div class="connection-status">
                <span class="status-indicator status-offline" id="connectionStatus"></span>
                <span id="connectionText">连接中...</span>
            </div>
        </div>
        <nav class="nav">
            <a href="/">仪表盘</a>
            <a href="/trades">交易记录</a>
            <a href="/signals">信号监控</a>
            <a href="/settings" class="active">设置</a>
        </nav>
    </header>

    <div class="container">
        <div id="alertBox" class="alert"></div>

        <div class="card">
            <h3>🔑 交易所与通知配置</h3>
            <div class="form-row">
                <div class="form-group">
                    <label>交易所API Key</label>
                    <input type="password" id="apiKey" placeholder="输入您的API Key">
                </div>
                <div class="form-group">
                    <label>交易所API Secret</label>
                    <input type="password" id="apiSecret" placeholder="输入您的API Secret">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Telegram Bot Token</label>
                    <input type="password" id="telegramToken" placeholder="输入Telegram Bot Token">
                    <p class="info-text">用于接收交易通知</p>
                </div>
                <div class="form-group">
                    <label>Telegram Chat ID</label>
                    <input type="text" id="telegramChatId" placeholder="输入Chat ID">
                </div>
            </div>
        </div>

        <div class="card">
            <h3>🧠 AI 大模型配置</h3>
            <p class="info-text" style="margin-bottom: 20px;">配置后即可在"信号监控"页面自由切换AI大脑。只需填写API Key即可启用对应模型，未填写的模型在选择时将呈灰色不可选状态。</p>
            <div class="form-row">
                <div class="form-group">
                    <label>OpenAI (GPT) API Key</label>
                    <input type="password" id="gptApiKey" placeholder="sk-...">
                </div>
                <div class="form-group">
                    <label>Gemini API Key</label>
                    <input type="password" id="geminiApiKey" placeholder="AIza...">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Claude API Key</label>
                    <input type="password" id="claudeApiKey" placeholder="sk-ant-...">
                </div>
                <div class="form-group">
                    <label>DeepSeek API Key</label>
                    <input type="password" id="deepseekApiKey" placeholder="sk-...">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>阿里千问 (Qwen) API Key</label>
                    <input type="password" id="qwenApiKey" placeholder="sk-...">
                </div>
                <div class="form-group">
                    <label>月之暗面 (Kimi) API Key</label>
                    <input type="password" id="kimiApiKey" placeholder="sk-...">
                </div>
            </div>
        </div>

        <div class="card">
            <h3>🧩 模型提供商管理</h3>
            <p class="info-text" style="margin-bottom: 12px;">可单独管理每个模型的 Key / Base URL / Model Name，并支持测试与禁用。</p>
            <div id="providerGrid" class="provider-grid"></div>
        </div>

        <div class="card">
            <h3>📧 邮件通知配置</h3>
            <div class="form-group">
                <div class="toggle-switch">
                    <input type="checkbox" id="emailEnabled">
                    <label for="emailEnabled">启用邮件通知</label>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>SMTP服务器</label>
                    <input type="text" id="emailHost" placeholder="smtp.gmail.com">
                </div>
                <div class="form-group">
                    <label>SMTP端口</label>
                    <input type="number" id="emailPort" placeholder="587" value="587">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>邮箱地址</label>
                    <input type="email" id="emailUser" placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label>邮箱密码/授权码</label>
                    <input type="password" id="emailPassword" placeholder="输入密码或授权码">
                </div>
            </div>
            <div class="form-group">
                <label>接收通知邮箱</label>
                <input type="email" id="emailTo" placeholder="接收通知的邮箱地址">
            </div>
        </div>

        <div class="card">
            <h3>⚙️ 交易参数</h3>
            <div class="form-row">
                <div class="form-group">
                    <label>最大持仓金额 (USDT)</label>
                    <input type="number" id="maxPosition" value="1000" step="100">
                </div>
                <div class="form-group">
                    <label>每日最大亏损 (USDT)</label>
                    <input type="number" id="maxDailyLoss" value="500" step="100">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>默认杠杆倍数</label>
                    <input type="number" id="leverage" value="3" min="1" max="125">
                </div>
                <div class="form-group">
                    <label>最大持仓数量</label>
                    <input type="number" id="maxPositions" value="5" min="1">
                </div>
            </div>
        </div>

        <div class="card">
            <h3>🎯 止盈止损设置</h3>
            <div class="form-row">
                <div class="form-group">
                    <label>止损比例 (%)</label>
                    <input type="number" id="stopLossPercent" value="2" step="0.1" min="0.1" max="50">
                </div>
                <div class="form-group">
                    <label>止盈比例 (%)</label>
                    <input type="number" id="takeProfitPercent" value="4" step="0.1" min="0.1" max="100">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>跟踪止损比例 (%)</label>
                    <input type="number" id="trailingStopPercent" value="1" step="0.1" min="0.1" max="10">
                    <p class="info-text">盈利后自动调整止损价格的比例</p>
                </div>
                <div class="form-group">
                    <div class="toggle-switch" style="margin-top: 30px;">
                        <input type="checkbox" id="trailingStopEnabled" checked>
                        <label for="trailingStopEnabled">启用跟踪止损</label>
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <h3>🔧 系统设置</h3>
            <div class="form-row">
                <div class="form-group">
                    <label>Web服务端口</label>
                    <input type="number" id="webPort" value="5000" min="1000" max="65535">
                </div>
                <div class="form-group">
                    <label>日志级别</label>
                    <select id="logLevel">
                        <option value="DEBUG">DEBUG</option>
                        <option value="INFO" selected>INFO</option>
                        <option value="WARNING">WARNING</option>
                        <option value="ERROR">ERROR</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="card danger-zone">
            <h3>⚠️ 危险区域</h3>
            <p style="margin-bottom: 15px; color: #a0aec0;">以下操作可能导致资金损失，请谨慎操作。</p>
            <button class="btn btn-danger" onclick="clearAllData()">🗑️ 清除所有交易数据</button>
            <button class="btn btn-danger" onclick="resetToDefault()">↩️ 恢复默认设置</button>
        </div>

        <div style="text-align: center; margin-top: 30px;">
            <button class="btn btn-primary" onclick="saveSettings()">💾 保存设置</button>
            <button class="btn btn-secondary" onclick="loadSettings()">🔄 重置</button>
        </div>
    </div>

    <script>
        const socket = io();
        
        socket.on('connect', function() {
            console.log('[Settings] Socket connected');
            document.getElementById('connectionStatus').className = 'status-indicator status-online';
            document.getElementById('connectionText').textContent = '已连接';
        });
        
        socket.on('disconnect', function() {
            console.log('[Settings] Socket disconnected');
            document.getElementById('connectionStatus').className = 'status-indicator status-offline';
            document.getElementById('connectionText').textContent = '已断开';
        });
        
        function setElementValue(id, value, isCheckbox = false) {
            const el = document.getElementById(id);
            if (el) {
                if (isCheckbox) {
                    el.checked = value;
                } else {
                    el.value = value;
                }
            }
        }

        async function loadSettings() {
            try {
                const response = await fetch('/api/settings');
                const data = await response.json();
                
                if (data.success) {
                    const settings = data.data;
                    
                    // 原有基础设置
                    setElementValue('maxPosition', settings.max_position_usdt || 1000);
                    setElementValue('maxDailyLoss', settings.max_daily_loss_usdt || 500);
                    setElementValue('leverage', settings.default_leverage || 3);
                    setElementValue('maxPositions', settings.max_positions_count || 5);
                    setElementValue('stopLossPercent', settings.stop_loss_percent || 2);
                    setElementValue('takeProfitPercent', settings.take_profit_percent || 4);
                    setElementValue('trailingStopPercent', settings.trailing_stop_percent || 1);
                    setElementValue('trailingStopEnabled', settings.trailing_stop_enabled !== false, true);
                    setElementValue('webPort', settings.web_port || 5000);
                    setElementValue('logLevel', settings.log_level || 'INFO');
                    setElementValue('emailEnabled', settings.email_enabled || false, true);
                    setElementValue('emailHost', settings.email_host || '');
                    setElementValue('emailPort', settings.email_port || 587);
                    setElementValue('emailUser', settings.email_user || '');
                    setElementValue('emailPassword', settings.email_password || '');
                    setElementValue('emailTo', settings.email_to || '');

                    // 交易所与通知配置回显
                    setElementValue('apiKey', settings.binance_api_key || '');
                    setElementValue('apiSecret', settings.binance_secret_key || '');
                    setElementValue('telegramToken', settings.telegram_bot_token || '');
                    setElementValue('telegramChatId', settings.telegram_chat_id || '');
                    
                    // 新增的 AI 大模型 API Key 回显读取
                    setElementValue('gptApiKey', settings.gpt_api_key || '');
                    setElementValue('geminiApiKey', settings.gemini_api_key || '');
                    setElementValue('claudeApiKey', settings.claude_api_key || '');
                    setElementValue('qwenApiKey', settings.qwen_api_key || '');
                    setElementValue('kimiApiKey', settings.kimi_api_key || '');
                    setElementValue('deepseekApiKey', settings.deepseek_api_key || '');
                }
                await loadProviderCards();
            } catch (e) {
                console.error('加载设置失败:', e);
                showAlert('加载设置失败: ' + e.message, 'error');
            }
        }

        async function loadProviderCards() {
            const container = document.getElementById('providerGrid');
            if (!container) return;
            try {
                const response = await fetch('/api/ai/models');
                const payload = await response.json();
                if (!payload.success) {
                    container.innerHTML = '<div class="info-text">加载模型列表失败</div>';
                    return;
                }
                const items = payload.data || [];
                container.innerHTML = items.map(item => `
                    <div class="provider-card">
                        <div class="provider-title">
                            <strong>${item.label}</strong>
                            <span class="provider-status">${item.selectable ? '可用' : (item.configured ? '已配置/禁用' : '未配置')}</span>
                        </div>
                        <div class="form-group">
                            <label>API Key</label>
                            <input type="password" id="provider_key_${item.provider_key}" placeholder="输入 API Key">
                        </div>
                        <div class="form-group">
                            <label>Base URL</label>
                            <input type="text" id="provider_url_${item.provider_key}" value="${item.base_url || ''}" placeholder="可选">
                        </div>
                        <div class="form-group">
                            <label>Model Name</label>
                            <input type="text" id="provider_model_${item.provider_key}" value="${item.model_name || ''}" placeholder="可选">
                        </div>
                        <div class="provider-actions">
                            <button class="btn btn-primary" onclick="saveProvider('${item.provider_key}')">保存</button>
                            <button class="btn btn-secondary" onclick="testProvider('${item.provider_key}')">测试</button>
                            <button class="btn btn-danger" onclick="disableProvider('${item.provider_key}')">禁用</button>
                        </div>
                    </div>
                `).join('');

                for (const item of items) {
                    try {
                        const detailResp = await fetch(`/api/ai/providers/${item.provider_key}`);
                        const detailPayload = await detailResp.json();
                        if (detailPayload.success) {
                            const d = detailPayload.data || {};
                            setElementValue(`provider_key_${item.provider_key}`, d.api_key || '');
                            setElementValue(`provider_url_${item.provider_key}`, d.base_url || '');
                            setElementValue(`provider_model_${item.provider_key}`, d.model_name || '');
                        }
                    } catch (_) {}
                }
            } catch (e) {
                container.innerHTML = `<div class="info-text">加载失败: ${e.message}</div>`;
            }
        }

        async function saveProvider(providerKey) {
            const api_key = (document.getElementById(`provider_key_${providerKey}`)?.value || '').trim();
            const base_url = (document.getElementById(`provider_url_${providerKey}`)?.value || '').trim();
            const model_name = (document.getElementById(`provider_model_${providerKey}`)?.value || '').trim();
            try {
                const response = await fetch(`/api/ai/providers/${providerKey}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({api_key, base_url, model_name, is_enabled: !!api_key})
                });
                const payload = await response.json();
                if (payload.success) {
                    showAlert(`${providerKey} 保存成功`, 'success');
                    await loadProviderCards();
                } else {
                    showAlert(`${providerKey} 保存失败: ${payload.error || ''}`, 'error');
                }
            } catch (e) {
                showAlert(`${providerKey} 保存失败: ${e.message}`, 'error');
            }
        }

        async function testProvider(providerKey) {
            try {
                const response = await fetch(`/api/ai/providers/${providerKey}/test`, {method: 'POST'});
                const payload = await response.json();
                if (payload.success) {
                    showAlert(`${providerKey} 测试成功`, 'success');
                } else {
                    showAlert(`${providerKey} 测试失败: ${payload.error || ''}`, 'error');
                }
            } catch (e) {
                showAlert(`${providerKey} 测试异常: ${e.message}`, 'error');
            }
        }

        async function disableProvider(providerKey) {
            try {
                const response = await fetch(`/api/ai/providers/${providerKey}/disable`, {method: 'POST'});
                const payload = await response.json();
                if (payload.success) {
                    showAlert(`${providerKey} 已禁用`, 'success');
                    await loadProviderCards();
                } else {
                    showAlert(`${providerKey} 禁用失败: ${payload.error || ''}`, 'error');
                }
            } catch (e) {
                showAlert(`${providerKey} 禁用失败: ${e.message}`, 'error');
            }
        }

        async function saveSettings() {
            const settings = {
                max_position_usdt: parseFloat(document.getElementById('maxPosition').value),
                max_daily_loss_usdt: parseFloat(document.getElementById('maxDailyLoss').value),
                default_leverage: parseInt(document.getElementById('leverage').value),
                max_positions_count: parseInt(document.getElementById('maxPositions').value),
                stop_loss_percent: parseFloat(document.getElementById('stopLossPercent').value),
                take_profit_percent: parseFloat(document.getElementById('takeProfitPercent').value),
                trailing_stop_percent: parseFloat(document.getElementById('trailingStopPercent').value),
                trailing_stop_enabled: document.getElementById('trailingStopEnabled').checked,
                web_port: parseInt(document.getElementById('webPort').value),
                log_level: document.getElementById('logLevel').value,
                email_enabled: document.getElementById('emailEnabled').checked,
                email_host: document.getElementById('emailHost').value,
                email_port: parseInt(document.getElementById('emailPort').value),
                email_user: document.getElementById('emailUser').value,
                email_password: document.getElementById('emailPassword').value,
                email_to: document.getElementById('emailTo').value,
                api_key: document.getElementById('apiKey').value,
                api_secret: document.getElementById('apiSecret').value,
                telegram_token: document.getElementById('telegramToken').value,
                telegram_chat_id: document.getElementById('telegramChatId').value,
                
                // 提交新增的 AI 大模型 API Key 数据
                gpt_api_key: document.getElementById('gptApiKey').value,
                gemini_api_key: document.getElementById('geminiApiKey').value,
                claude_api_key: document.getElementById('claudeApiKey').value,
                qwen_api_key: document.getElementById('qwenApiKey').value,
                kimi_api_key: document.getElementById('kimiApiKey').value,
                deepseek_api_key: document.getElementById('deepseekApiKey').value
            };

            try {
                const response = await fetch('/api/settings', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(settings)
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showAlert('设置保存成功！', 'success');
                    setTimeout(() => {
                        loadSettings();
                    }, 500);
                } else {
                    showAlert('保存失败: ' + (data.error || '未知错误'), 'error');
                }
            } catch (e) {
                showAlert('保存失败: ' + e.message, 'error');
            }
        }

        function showAlert(message, type) {
            const alertBox = document.getElementById('alertBox');
            alertBox.className = 'alert alert-' + type;
            alertBox.textContent = message;
            alertBox.style.display = 'block';
            
            setTimeout(() => {
                alertBox.style.display = 'none';
            }, 5000);
        }

        function clearAllData() {
            if (!confirm('确定要清除所有交易数据吗？此操作不可恢复！')) {
                return;
            }
            fetch('/api/clear_data', {method: 'POST'})
                .then(r => r.json())
                .then(data => {
                    if (data.success) showAlert('数据已清除', 'success');
                })
                .catch(e => showAlert('清除失败: ' + e.message, 'error'));
        }

        function resetToDefault() {
            if (!confirm('确定要恢复默认设置吗？')) {
                return;
            }
            fetch('/api/reset_settings', {method: 'POST'})
                .then(r => r.json())
                .then(data => {
                    if (data.success) {
                        loadSettings();
                        showAlert('已恢复默认设置', 'success');
                    }
                })
                .catch(e => showAlert('重置失败: ' + e.message, 'error'));
        }

        let heartbeatInterval = null;
        let lastHeartbeatResponse = Date.now();
        
        function startHeartbeat() {
            heartbeatInterval = setInterval(() => {
                const now = Date.now();
                socket.emit('heartbeat', { timestamp: now, page: 'settings' });
                
                if (now - lastHeartbeatResponse > 120000) {
                    console.warn('[Heartbeat] Timeout detected');
                }
            }, 60000);
        }
        
        socket.on('heartbeat_ack', function(data) {
            lastHeartbeatResponse = Date.now();
        });
        
        document.addEventListener('visibilitychange', function() {
            if (!document.hidden) loadSettings();
        });

        document.addEventListener('DOMContentLoaded', function() {
            loadSettings();
            startHeartbeat();
        });
    </script>
</body>
</html>
