<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自动化交易生存指南-量化交易系统 - 仪表盘 v2.0</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f1419;
            color: #e0e0e0;
            min-height: 100vh;
            padding-top: 130px;
        }
        
        .header {
            background: linear-gradient(135deg, #1a1f2e 0%, #2d3748 100%);
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
        }
        
        .header h1 {
            font-size: 24px;
            color: #4fd1c5;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .nav {
            display: flex;
            gap: 20px;
            margin-top: 15px;
        }
        
        .nav a {
            color: #a0aec0;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 6px;
            transition: all 0.3s;
        }
        
        .nav a:hover, .nav a.active {
            background: #4fd1c5;
            color: #1a1f2e;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .card {
            background: #1a1f2e;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            border: 1px solid #2d3748;
        }
        
        .card h3 {
            color: #4fd1c5;
            margin-bottom: 15px;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: #fff;
        }
        
        .stat-label {
            color: #a0aec0;
            font-size: 14px;
            margin-top: 5px;
        }
        
        .positive { color: #48bb78; }
        .negative { color: #f56565; }
        .neutral { color: #ed8936; }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: #4fd1c5;
            color: #1a1f2e;
        }
        
        .btn-primary:hover {
            background: #38b2ac;
        }
        
        .btn-danger {
            background: #f56565;
            color: white;
        }
        
        .btn-danger:hover {
            background: #e53e3e;
        }
        
        .btn-warning {
            background: #ed8936;
            color: white;
        }
        
        .btn-warning:hover {
            background: #dd6b20;
        }
        
        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }
        
        .status-online { background: #48bb78; box-shadow: 0 0 10px #48bb78; }
        .status-offline { background: #f56565; }
        .status-warning { background: #ed8936; }
        
        .positions-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        
        .positions-table th,
        .positions-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #2d3748;
        }
        
        .positions-table th {
            color: #4fd1c5;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1px;
        }
        
        .positions-table tr:hover {
            background: #2d3748;
        }
        
        .badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .badge-long {
            background: rgba(72, 187, 120, 0.2);
            color: #48bb78;
        }
        
        .badge-short {
            background: rgba(245, 101, 101, 0.2);
            color: #f56565;
        }
        
        .chart-container {
            height: 550px;
            margin-top: 20px;
            position: relative;
        }
        
        #chartSymbol, #chartTimeframe {
            padding: 8px 15px;
            font-size: 14px;
            background: #2d3748;
            color: #e0e0e0;
            border: 1px solid #4fd1c5;
            border-radius: 6px;
            cursor: pointer;
            margin-right: 10px;
        }
        
        #chartSymbol:focus, #chartTimeframe:focus {
            outline: none;
            border-color: #38b2ac;
        }
        
        optgroup {
            background: #1a1f2e;
            color: #4fd1c5;
            font-weight: bold;
        }
        
        .control-panel {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 15px;
        }
        
        .connection-status {
            padding: 8px 16px;
            background: rgba(45, 55, 72, 0.8);
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
        }
        
        .risk-meter {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }
        
        .risk-bar {
            flex: 1;
            height: 8px;
            background: #2d3748;
            border-radius: 4px;
            overflow: hidden;
        }
        
        .risk-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.3s;
        }
        
        .risk-low { background: #48bb78; }
        .risk-medium { background: #ed8936; }
        .risk-high { background: #f56565; }
        
        .log-container {
            background: #0d1117;
            border-radius: 8px;
            padding: 15px;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            margin-top: 15px;
        }
        
        .log-entry {
            padding: 4px 0;
            border-bottom: 1px solid #1a1f2e;
        }
        
        .log-time { color: #6b7280; }
        .log-info { color: #4fd1c5; }
        .log-error { color: #f56565; }
        .log-warning { color: #ed8936; }
        
        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }
            
            .nav {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-top">
            <h1>📈 自动化交易生存指南-量化交易系统<V1 class="0">v1.0</V1></h1>
            <div class="connection-status">
                <span class="status-indicator status-offline" id="connectionStatus"></span>
                <span id="connectionText">连接中...</span>
            </div>
        </div>
        <nav class="nav">
            <a href="/" class="active">仪表盘</a>
            <a href="/trades">交易记录</a>
            <a href="/signals">信号监控</a>
            <a href="/settings">设置</a>
        </nav>
    </header>

    <div class="container">
        <!-- 控制面板 -->
        <div class="card" style="margin-bottom: 20px;">
            <h3>⚡ 交易控制</h3>
            <div class="control-panel">
                <button class="btn btn-primary" id="startBtn" onclick="startTrading()">
                    ▶️ 启动自动交易
                </button>
                <button class="btn btn-warning" id="stopBtn" onclick="stopTrading()">
                    ⏸️ 停止自动交易
                </button>
                <button class="btn btn-danger" onclick="emergencyStop()">
                    🚨 紧急停止
                </button>
                <button class="btn btn-primary" onclick="refreshData()">
                    🔄 刷新数据
                </button>
            </div>
            <div style="margin-top: 15px;">
                <span class="status-indicator" id="tradingStatus"></span>
                <span id="tradingStatusText">自动交易状态: 未知</span>
            </div>
        </div>

        <!-- 统计卡片 -->
        <div class="grid">
            <div class="card">
                <h3>💰 账户余额</h3>
                <div class="stat-value" id="balanceValue">--</div>
                <div class="stat-label">USDT</div>
            </div>
            
            <div class="card">
                <h3>📊 未实现盈亏</h3>
                <div class="stat-value" id="unrealizedPnl">--</div>
                <div class="stat-label">当前持仓盈亏</div>
            </div>
            
            <div class="card">
                <h3>📈 持仓数量</h3>
                <div class="stat-value" id="positionCount">--</div>
                <div class="stat-label">活跃持仓</div>
            </div>
            
            <div class="card">
                <h3>⚠️ 今日盈亏</h3>
                <div class="stat-value" id="dailyPnl">--</div>
                <div class="stat-label">今日累计</div>
            </div>
        </div>

        <!-- 实时K线图表 -->
        <div class="card" style="margin-bottom: 20px;">
            <h3>📊 实时K线图表</h3>
            <div style="margin-bottom: 15px;">
                <select id="chartSymbol" onchange="updateChart()">
                    <optgroup label="主流币">
                        <option value="BTC/USDT">BTC/USDT</option>
                        <option value="ETH/USDT">ETH/USDT</option>
                        <option value="SOL/USDT">SOL/USDT</option>
                        <option value="BNB/USDT">BNB/USDT</option>
                        <option value="XRP/USDT">XRP/USDT</option>
                        <option value="DOGE/USDT">DOGE/USDT</option>
                        <option value="ADA/USDT">ADA/USDT</option>
                        <option value="AVAX/USDT">AVAX/USDT</option>
                    </optgroup>
                    <optgroup label="Layer 2 & DeFi">
                        <option value="MATIC/USDT">MATIC/USDT</option>
                        <option value="ARB/USDT">ARB/USDT</option>
                        <option value="OP/USDT">OP/USDT</option>
                        <option value="LINK/USDT">LINK/USDT</option>
                        <option value="UNI/USDT">UNI/USDT</option>
                        <option value="AAVE/USDT">AAVE/USDT</option>
                    </optgroup>
                    <optgroup label="Meme & 其他">
                        <option value="SHIB/USDT">SHIB/USDT</option>
                        <option value="PEPE/USDT">PEPE/USDT</option>
                        <option value="WIF/USDT">WIF/USDT</option>
                        <option value="BONK/USDT">BONK/USDT</option>
                        <option value="FLOKI/USDT">FLOKI/USDT</option>
                    </optgroup>
                </select>
                <select id="chartTimeframe" onchange="updateChart()">
                    <option value="15m">15分钟</option>
                    <option value="1h" selected>1小时</option>
                    <option value="4h">4小时</option>
                    <option value="1d">1天</option>
                </select>
            </div>
            <div id="candlestickChart" class="chart-container"></div>
        </div>

        <!-- 持仓列表 -->
        <div class="card" style="margin-bottom: 20px;">
            <h3>📋 当前持仓</h3>
            <table class="positions-table">
                <thead>
                    <tr>
                        <th>交易对</th>
                        <th>方向</th>
                        <th>数量</th>
                        <th>入场价</th>
                        <th>标记价</th>
                        <th>未实现盈亏</th>
                        <th>杠杆</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="positionsTable">
                    <tr>
                        <td colspan="8" style="text-align: center; color: #6b7280;">暂无持仓</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- 风险状态 -->
        <div class="card" style="margin-bottom: 20px;">
            <h3>⚠️ 风险管理</h3>
            <div id="riskStatus">
                <div class="risk-meter">
                    <span>交易状态:</span>
                    <span id="tradingEnabled">--</span>
                </div>
                <div class="risk-meter">
                    <span>今日交易:</span>
                    <span id="dailyTrades">--</span>
                </div>
                <div class="risk-meter">
                    <span>止损比例:</span>
                    <span id="stopLossPercent">--</span>
                </div>
                <div class="risk-meter">
                    <span>止盈比例:</span>
                    <span id="takeProfitPercent">--</span>
                </div>
                <div class="risk-meter">
                    <span>跟踪止损:</span>
                    <span id="trailingStopPercent">--</span>
                </div>
            </div>
        </div>

        <!-- 系统日志 -->
        <div class="card">
            <h3>📝 系统日志</h3>
            <div class="log-container" id="logContainer">
                <div class="log-entry">
                    <span class="log-time">[系统]</span>
                    <span class="log-info">正在连接服务器...</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        console.log('[Dashboard] Script loading...');
        
        const socket = io();
        let currentData = {};
        let chartData = {};
        
        console.log('[Dashboard] Socket.io initialized');

        // Socket.io 连接事件
        socket.on('connect', function() {
            console.log('[Dashboard] Socket connected!');
            document.getElementById('connectionStatus').className = 'status-indicator status-online';
            document.getElementById('connectionText').textContent = '已连接';
            addLog('系统', '已连接到服务器', 'info');
        });

        socket.on('disconnect', function() {
            console.log('[Dashboard] Socket disconnected!');
            document.getElementById('connectionStatus').className = 'status-indicator status-offline';
            document.getElementById('connectionText').textContent = '已断开';
            addLog('系统', '与服务器断开连接', 'error');
        });

        socket.on('status_update', function(data) {
            console.log('[Dashboard] Received status_update:', data);
            currentData = data;
            updateDashboard(data);
        });
        
        socket.on('connect_error', function(error) {
            console.error('[Dashboard] Socket connection error:', error);
        });

        // 更新仪表盘
        function updateDashboard(data) {
            console.log('[Dashboard] Updating with data:', data);
            // 更新余额
            if (data.balance) {
                document.getElementById('balanceValue').textContent = 
                    parseFloat(data.balance.USDT || 0).toFixed(2);
            }

            // 更新未实现盈亏
            const unrealizedPnl = data.total_unrealized_pnl || 0;
            const pnlElement = document.getElementById('unrealizedPnl');
            pnlElement.textContent = (unrealizedPnl >= 0 ? '+' : '') + unrealizedPnl.toFixed(2);
            pnlElement.className = 'stat-value ' + (unrealizedPnl >= 0 ? 'positive' : 'negative');

            // 更新持仓数量
            document.getElementById('positionCount').textContent = data.position_count || 0;

            // 更新交易状态 - 使用 auto_trading 作为唯一标准
            const tradingStatus = document.getElementById('tradingStatus');
            const tradingStatusText = document.getElementById('tradingStatusText');
            // 使用 auto_trading 判断交易状态（order_executor 控制）
            const isTrading = data.auto_trading === true;
            if (isTrading) {
                tradingStatus.className = 'status-indicator status-online';
                tradingStatusText.textContent = '自动交易状态: 运行中';
            } else {
                tradingStatus.className = 'status-indicator status-offline';
                tradingStatusText.textContent = '自动交易状态: 已停止';
            }

            // 更新持仓列表
            updatePositionsTable(data.positions);

            // 更新风险状态
            if (data.risk_status) {
                // 将 auto_trading 状态传递给 risk_status，确保一致性
                data.risk_status.auto_trading = data.auto_trading;
                updateRiskStatus(data.risk_status);
            }
        }

        // 更新持仓表格
        function updatePositionsTable(positions) {
            console.log('[Positions] Updating with:', positions);
            const tbody = document.getElementById('positionsTable');
            if (!positions || positions.length === 0) {
                console.log('[Positions] No positions to display');
                tbody.innerHTML = '<tr><td colspan="8" style="text-align: center; color: #6b7280;">暂无持仓</td></tr>';
                return;
            }
            console.log('[Positions] Rendering', positions.length, 'positions');

            tbody.innerHTML = positions.map(pos => {
                // 安全获取字段值，提供默认值
                const symbol = pos.symbol || '-';
                const side = pos.side || 'LONG';
                const contracts = parseFloat(pos.contracts) || 0;
                const entryPrice = parseFloat(pos.entry_price) || 0;
                const markPrice = parseFloat(pos.mark_price) || 0;
                const unrealizedPnl = parseFloat(pos.unrealized_pnl) || 0;
                const leverage = parseInt(pos.leverage) || 1;
                
                return `
                <tr>
                    <td>${symbol}</td>
                    <td><span class="badge badge-${side.toLowerCase()}">${side}</span></td>
                    <td>${contracts.toFixed(4)}</td>
                    <td>$${entryPrice.toFixed(2)}</td>
                    <td>$${markPrice.toFixed(2)}</td>
                    <td class="${unrealizedPnl >= 0 ? 'positive' : 'negative'}">
                        ${unrealizedPnl >= 0 ? '+' : ''}${unrealizedPnl.toFixed(2)}
                    </td>
                    <td>${leverage}x</td>
                    <td>
                        <button class="btn btn-danger" style="padding: 6px 12px; font-size: 12px;" 
                                onclick="closePosition('${symbol}')">平仓</button>
                    </td>
                </tr>
            `}).join('');
        }

        // 更新风险状态
        function updateRiskStatus(status) {
            // 优先使用传入的 auto_trading 状态，确保实时更新
            const isTradingEnabled = status.auto_trading !== undefined ? status.auto_trading : 
                                     (currentData.auto_trading !== undefined ? currentData.auto_trading : status.trading_enabled);
            document.getElementById('tradingEnabled').textContent = isTradingEnabled ? '✅ 启用' : '❌ 禁用';
            document.getElementById('dailyTrades').textContent = `${status.daily_trades || 0} 笔`;
            document.getElementById('dailyPnl').textContent = (status.daily_pnl || 0).toFixed(2) + ' USDT';
            document.getElementById('dailyPnl').className = 'stat-value ' + ((status.daily_pnl || 0) >= 0 ? 'positive' : 'negative');
            document.getElementById('stopLossPercent').textContent = (status.stop_loss_percent || 2) + '%';
            document.getElementById('takeProfitPercent').textContent = (status.take_profit_percent || 4) + '%';
            document.getElementById('trailingStopPercent').textContent = (status.trailing_stop_percent || 1.0) + '%';
        }

        // TradingView Lightweight Charts 实例
        let chart = null;
        let candlestickSeries = null;
        let volumeSeries = null;

        // 初始化图表
        function initChart() {
            const chartContainer = document.getElementById('candlestickChart');
            
            // 创建图表
            chart = LightweightCharts.createChart(chartContainer, {
                layout: {
                    background: { color: '#0d1117' },
                    textColor: '#e0e0e0',
                },
                grid: {
                    vertLines: { color: '#2d3748' },
                    horzLines: { color: '#2d3748' },
                },
                crosshair: {
                    mode: LightweightCharts.CrosshairMode.Normal,
                },
                rightPriceScale: {
                    borderColor: '#2d3748',
                    scaleMargins: {
                        top: 0.1,
                        bottom: 0.2,
                    },
                    autoScale: true,
                    alignLabels: true,
                },
                leftPriceScale: {
                    visible: false,
                },
                timeScale: {
                    borderColor: '#2d3748',
                    timeVisible: true,
                    secondsVisible: false,
                    rightOffset: 10,
                    barSpacing: 8,
                },
                handleScroll: {
                    vertTouchDrag: false,
                },
                handleScale: {
                    axisPressedMouseMove: {
                        time: true,
                        price: false,
                    },
                },
            });

            // 创建K线系列
            candlestickSeries = chart.addCandlestickSeries({
                upColor: '#48bb78',
                downColor: '#f56565',
                borderUpColor: '#48bb78',
                borderDownColor: '#f56565',
                wickUpColor: '#48bb78',
                wickDownColor: '#f56565',
            });

            // 创建成交量系列（在底部）
            volumeSeries = chart.addHistogramSeries({
                color: '#26a69a',
                priceFormat: {
                    type: 'volume',
                },
                priceScaleId: 'volume',
                scaleMargins: {
                    top: 0.85,
                    bottom: 0.05,
                },
            });
            
            // 设置成交量价格轴
            chart.priceScale('volume').applyOptions({
                scaleMargins: {
                    top: 0.85,
                    bottom: 0.05,
                },
                borderColor: '#2d3748',
                visible: true,
                alignLabels: false,
            });

            // 响应式调整
            window.addEventListener('resize', () => {
                chart.applyOptions({
                    width: chartContainer.clientWidth,
                    height: chartContainer.clientHeight,
                });
            });
        }

        // 更新K线图表
        async function updateChart() {
            const symbol = document.getElementById('chartSymbol').value;
            const timeframe = document.getElementById('chartTimeframe').value;
            
            try {
                const response = await fetch(`/api/ohlcv?symbol=${symbol}&timeframe=${timeframe}`);
                if (response.ok) {
                    const result = await response.json();
                    if (result.success) {
                        renderCandlestickChart(result.data);
                    }
                }
            } catch (e) {
                console.error('获取K线数据失败:', e);
                addLog('错误', '获取K线数据失败', 'error');
            }
        }

        // 渲染K线图
        function renderCandlestickChart(data) {
            if (!chart) {
                initChart();
            }

            if (!data || data.length === 0) {
                addLog('图表', '暂无数据', 'warning');
                return;
            }

            // 转换数据格式
            const candleData = data.map(d => ({
                time: d.time / 1000, // 转换为秒级时间戳
                open: d.open,
                high: d.high,
                low: d.low,
                close: d.close,
            }));

            const volumeData = data.map(d => ({
                time: d.time / 1000,
                value: d.volume,
                color: d.close >= d.open ? 'rgba(72, 187, 120, 0.5)' : 'rgba(245, 101, 101, 0.5)',
            }));

            candlestickSeries.setData(candleData);
            volumeSeries.setData(volumeData);
            
            // 自适应缩放
            chart.timeScale().fitContent();
            
            // 自动调整价格范围
            const prices = data.map(d => [d.high, d.low]).flat();
            const minPrice = Math.min(...prices);
            const maxPrice = Math.max(...prices);
            const priceRange = maxPrice - minPrice;
            
            chart.priceScale('right').applyOptions({
                autoScale: true,
            });
            
            addLog('图表', `已加载 ${data.length} 条K线数据`, 'info');
        }

        // 控制函数
        async function startTrading() {
            try {
                // 禁用按钮防止重复点击
                const btn = document.getElementById('startBtn');
                btn.disabled = true;
                btn.textContent = '⏳ 启动中...';
                
                const response = await fetch('/api/trading/start', {method: 'POST'});
                const data = await response.json();
                if (data.success) {
                    addLog('交易', '自动交易已启动', 'info');
                    // 更新本地状态并刷新UI
                    currentData.auto_trading = true;
                    if (currentData.risk_status) {
                        currentData.risk_status.trading_enabled = true;
                        currentData.risk_status.auto_trading = true;
                    }
                    updateDashboard(currentData);
                    // 延迟刷新确保后端状态同步
                    setTimeout(refreshData, 1000);
                } else {
                    addLog('错误', data.error || '启动失败', 'error');
                }
            } catch (e) {
                addLog('错误', '启动请求失败: ' + e.message, 'error');
            } finally {
                // 恢复按钮
                const btn = document.getElementById('startBtn');
                btn.disabled = false;
                btn.textContent = '▶️ 启动自动交易';
            }
        }

        async function stopTrading() {
            try {
                // 禁用按钮防止重复点击
                const btn = document.getElementById('stopBtn');
                btn.disabled = true;
                btn.textContent = '⏳ 停止中...';
                
                const response = await fetch('/api/trading/stop', {method: 'POST'});
                const data = await response.json();
                if (data.success) {
                    addLog('交易', '自动交易已停止', 'warning');
                    // 更新本地状态并刷新UI
                    currentData.auto_trading = false;
                    if (currentData.risk_status) {
                        currentData.risk_status.trading_enabled = false;
                        currentData.risk_status.auto_trading = false;
                    }
                    updateDashboard(currentData);
                    // 延迟刷新确保后端状态同步
                    setTimeout(refreshData, 1000);
                }
            } catch (e) {
                addLog('错误', '停止请求失败: ' + e.message, 'error');
            } finally {
                // 恢复按钮
                const btn = document.getElementById('stopBtn');
                btn.disabled = false;
                btn.textContent = '⏸️ 停止自动交易';
            }
        }

        async function emergencyStop() {
            if (!confirm('确定要执行紧急停止吗？这将平掉所有持仓！')) {
                return;
            }
            try {
                const response = await fetch('/api/trading/emergency_stop', {method: 'POST'});
                const data = await response.json();
                if (data.success) {
                    addLog('紧急', '紧急停止已执行，所有持仓已平仓', 'error');
                    // 更新本地状态
                    currentData.auto_trading = false;
                    if (currentData.risk_status) {
                        currentData.risk_status.trading_enabled = false;
                        currentData.risk_status.auto_trading = false;
                    }
                    // 清空持仓显示
                    currentData.positions = [];
                    updateDashboard(currentData);
                    // 延迟刷新确保后端状态同步
                    setTimeout(refreshData, 1500);
                }
            } catch (e) {
                addLog('错误', '紧急停止请求失败: ' + e.message, 'error');
            }
        }

        async function closePosition(symbol) {
            if (!confirm(`确定要平仓 ${symbol} 吗？`)) {
                return;
            }
            try {
                const response = await fetch('/api/position/close', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({symbol: symbol})
                });
                const data = await response.json();
                if (data.success) {
                    addLog('交易', `${symbol} 平仓成功`, 'info');
                    // 从本地状态中移除该持仓
                    if (currentData.positions) {
                        currentData.positions = currentData.positions.filter(p => p.symbol !== symbol);
                        updateDashboard(currentData);
                    }
                    // 延迟刷新确保后端状态同步
                    setTimeout(refreshData, 1000);
                } else {
                    addLog('错误', data.error || '平仓失败', 'error');
                }
            } catch (e) {
                addLog('错误', '平仓请求失败: ' + e.message, 'error');
            }
        }

        async function refreshData() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();
                if (data.success) {
                    updateDashboard(data.data);
                    addLog('系统', '数据已刷新', 'info');
                }
            } catch (e) {
                addLog('错误', '刷新数据失败', 'error');
            }
        }

        // 添加日志
        function addLog(source, message, type) {
            const container = document.getElementById('logContainer');
            const time = new Date().toLocaleTimeString();
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `
                <span class="log-time">[${time}]</span>
                <span class="log-${type}">[${source}] ${message}</span>
            `;
            container.insertBefore(entry, container.firstChild);
            
            // 限制日志数量
            while (container.children.length > 100) {
                container.removeChild(container.lastChild);
            }
        }

        // 心跳机制
        let heartbeatInterval = null;
        let lastHeartbeatResponse = Date.now();
        
        function startHeartbeat() {
            // 每60秒发送一次心跳
            heartbeatInterval = setInterval(() => {
                const now = Date.now();
                socket.emit('heartbeat', { timestamp: now, page: 'dashboard' });
                addLog('心跳', `系统心跳 - ${new Date().toLocaleTimeString()}`, 'info');
                
                // 检查心跳超时（120秒）
                if (now - lastHeartbeatResponse > 120000) {
                    addLog('警告', '心跳超时，连接可能异常', 'error');
                    document.getElementById('connectionStatus').className = 'status-indicator status-warning';
                    document.getElementById('connectionText').textContent = '连接异常';
                }
            }, 60000);
        }
        
        socket.on('heartbeat_ack', function(data) {
            lastHeartbeatResponse = Date.now();
            console.log('[Heartbeat] ACK received:', data);
        });
        
        // 页面可见性检测
        document.addEventListener('visibilitychange', function() {
            if (!document.hidden) {
                console.log('[Dashboard] Page visible, refreshing data...');
                refreshData();
                updateChart();
                addLog('系统', '页面重新可见，已刷新数据', 'info');
            }
        });

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            refreshData();
            initChart();
            updateChart();
            startHeartbeat();
            
            // 定期刷新数据（每10秒）
            setInterval(refreshData, 10000);
            // 定期刷新图表
            setInterval(updateChart, 30000);
        });
    </script>
</body>
</html>
