<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>量化交易系统 - 仪表盘</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f1419;
            color: #e0e0e0;
            min-height: 100vh;
        }
        
        .header {
            background: linear-gradient(135deg, #1a1f2e 0%, #2d3748 100%);
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        
        .header h1 {
            font-size: 24px;
            color: #4fd1c5;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .nav {
            display: flex;
            gap: 20px;
            margin-top: 15px;
        }
        
        .nav a {
            color: #a0aec0;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 6px;
            transition: all 0.3s;
        }
        
        .nav a:hover, .nav a.active {
            background: #4fd1c5;
            color: #1a1f2e;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .card {
            background: #1a1f2e;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            border: 1px solid #2d3748;
        }
        
        .card h3 {
            color: #4fd1c5;
            margin-bottom: 15px;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: #fff;
        }
        
        .stat-label {
            color: #a0aec0;
            font-size: 14px;
            margin-top: 5px;
        }
        
        .positive { color: #48bb78; }
        .negative { color: #f56565; }
        .neutral { color: #ed8936; }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: #4fd1c5;
            color: #1a1f2e;
        }
        
        .btn-primary:hover {
            background: #38b2ac;
        }
        
        .btn-danger {
            background: #f56565;
            color: white;
        }
        
        .btn-danger:hover {
            background: #e53e3e;
        }
        
        .btn-warning {
            background: #ed8936;
            color: white;
        }
        
        .btn-warning:hover {
            background: #dd6b20;
        }
        
        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }
        
        .status-online { background: #48bb78; box-shadow: 0 0 10px #48bb78; }
        .status-offline { background: #f56565; }
        .status-warning { background: #ed8936; }
        
        .positions-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        
        .positions-table th,
        .positions-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #2d3748;
        }
        
        .positions-table th {
            color: #4fd1c5;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1px;
        }
        
        .positions-table tr:hover {
            background: #2d3748;
        }
        
        .badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .badge-long {
            background: rgba(72, 187, 120, 0.2);
            color: #48bb78;
        }
        
        .badge-short {
            background: rgba(245, 101, 101, 0.2);
            color: #f56565;
        }
        
        .chart-container {
            height: 400px;
            margin-top: 20px;
        }
        
        .control-panel {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 15px;
        }
        
        .connection-status {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: #2d3748;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 1000;
        }
        
        .risk-meter {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }
        
        .risk-bar {
            flex: 1;
            height: 8px;
            background: #2d3748;
            border-radius: 4px;
            overflow: hidden;
        }
        
        .risk-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.3s;
        }
        
        .risk-low { background: #48bb78; }
        .risk-medium { background: #ed8936; }
        .risk-high { background: #f56565; }
        
        .log-container {
            background: #0d1117;
            border-radius: 8px;
            padding: 15px;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            margin-top: 15px;
        }
        
        .log-entry {
            padding: 4px 0;
            border-bottom: 1px solid #1a1f2e;
        }
        
        .log-time { color: #6b7280; }
        .log-info { color: #4fd1c5; }
        .log-error { color: #f56565; }
        .log-warning { color: #ed8936; }
        
        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }
            
            .nav {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <div class="connection-status">
        <span class="status-indicator status-offline" id="connectionStatus"></span>
        <span id="connectionText">连接中...</span>
    </div>

    <header class="header">
        <h1>📈 量化交易系统</h1>
        <nav class="nav">
            <a href="/" class="active">仪表盘</a>
            <a href="/trades">交易记录</a>
            <a href="/signals">信号监控</a>
            <a href="/settings">设置</a>
        </nav>
    </header>

    <div class="container">
        <!-- 控制面板 -->
        <div class="card" style="margin-bottom: 20px;">
            <h3>⚡ 交易控制</h3>
            <div class="control-panel">
                <button class="btn btn-primary" id="startBtn" onclick="startTrading()">
                    ▶️ 启动自动交易
                </button>
                <button class="btn btn-warning" id="stopBtn" onclick="stopTrading()">
                    ⏸️ 停止自动交易
                </button>
                <button class="btn btn-danger" onclick="emergencyStop()">
                    🚨 紧急停止
                </button>
                <button class="btn btn-primary" onclick="refreshData()">
                    🔄 刷新数据
                </button>
            </div>
            <div style="margin-top: 15px;">
                <span class="status-indicator" id="tradingStatus"></span>
                <span id="tradingStatusText">自动交易状态: 未知</span>
            </div>
        </div>

        <!-- 统计卡片 -->
        <div class="grid">
            <div class="card">
                <h3>💰 账户余额</h3>
                <div class="stat-value" id="balanceValue">--</div>
                <div class="stat-label">USDT</div>
            </div>
            
            <div class="card">
                <h3>📊 未实现盈亏</h3>
                <div class="stat-value" id="unrealizedPnl">--</div>
                <div class="stat-label">当前持仓盈亏</div>
            </div>
            
            <div class="card">
                <h3>📈 持仓数量</h3>
                <div class="stat-value" id="positionCount">--</div>
                <div class="stat-label">活跃持仓</div>
            </div>
            
            <div class="card">
                <h3>⚠️ 今日盈亏</h3>
                <div class="stat-value" id="dailyPnl">--</div>
                <div class="stat-label">今日累计</div>
            </div>
        </div>

        <!-- 实时K线图表 -->
        <div class="card">
            <h3>📊 实时K线图表</h3>
            <div style="margin-bottom: 15px;">
                <select id="chartSymbol" onchange="updateChart()">
                    <option value="BTC/USDT">BTC/USDT</option>
                    <option value="ETH/USDT">ETH/USDT</option>
                    <option value="SOL/USDT">SOL/USDT</option>
                    <option value="BNB/USDT">BNB/USDT</option>
                </select>
                <select id="chartTimeframe" onchange="updateChart()">
                    <option value="15m">15分钟</option>
                    <option value="1h" selected>1小时</option>
                    <option value="4h">4小时</option>
                    <option value="1d">1天</option>
                </select>
            </div>
            <div id="candlestickChart" class="chart-container"></div>
        </div>

        <!-- 持仓列表 -->
        <div class="card">
            <h3>📋 当前持仓</h3>
            <table class="positions-table">
                <thead>
                    <tr>
                        <th>交易对</th>
                        <th>方向</th>
                        <th>数量</th>
                        <th>入场价</th>
                        <th>标记价</th>
                        <th>未实现盈亏</th>
                        <th>杠杆</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="positionsTable">
                    <tr>
                        <td colspan="8" style="text-align: center; color: #6b7280;">暂无持仓</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- 风险状态 -->
        <div class="card">
            <h3>⚠️ 风险管理</h3>
            <div id="riskStatus">
                <div class="risk-meter">
                    <span>交易状态:</span>
                    <span id="tradingEnabled">--</span>
                </div>
                <div class="risk-meter">
                    <span>今日交易:</span>
                    <span id="dailyTrades">--</span>
                </div>
                <div class="risk-meter">
                    <span>止损比例:</span>
                    <span id="stopLossPercent">--</span>
                </div>
                <div class="risk-meter">
                    <span>止盈比例:</span>
                    <span id="takeProfitPercent">--</span>
                </div>
                <div class="risk-meter">
                    <span>跟踪止损:</span>
                    <span id="trailingStopPercent">--</span>
                </div>
            </div>
        </div>

        <!-- 系统日志 -->
        <div class="card">
            <h3>📝 系统日志</h3>
            <div class="log-container" id="logContainer">
                <div class="log-entry">
                    <span class="log-time">[系统]</span>
                    <span class="log-info">正在连接服务器...</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        let currentData = {};
        let chartData = {};

        // Socket.io 连接事件
        socket.on('connect', function() {
            document.getElementById('connectionStatus').className = 'status-indicator status-online';
            document.getElementById('connectionText').textContent = '已连接';
            addLog('系统', '已连接到服务器', 'info');
        });

        socket.on('disconnect', function() {
            document.getElementById('connectionStatus').className = 'status-indicator status-offline';
            document.getElementById('connectionText').textContent = '已断开';
            addLog('系统', '与服务器断开连接', 'error');
        });

        socket.on('status_update', function(data) {
            currentData = data;
            updateDashboard(data);
        });

        // 更新仪表盘
        function updateDashboard(data) {
            // 更新余额
            if (data.balance) {
                document.getElementById('balanceValue').textContent = 
                    parseFloat(data.balance.USDT || 0).toFixed(2);
            }

            // 更新未实现盈亏
            const unrealizedPnl = data.total_unrealized_pnl || 0;
            const pnlElement = document.getElementById('unrealizedPnl');
            pnlElement.textContent = (unrealizedPnl >= 0 ? '+' : '') + unrealizedPnl.toFixed(2);
            pnlElement.className = 'stat-value ' + (unrealizedPnl >= 0 ? 'positive' : 'negative');

            // 更新持仓数量
            document.getElementById('positionCount').textContent = data.position_count || 0;

            // 更新交易状态
            const tradingStatus = document.getElementById('tradingStatus');
            const tradingStatusText = document.getElementById('tradingStatusText');
            if (data.auto_trading) {
                tradingStatus.className = 'status-indicator status-online';
                tradingStatusText.textContent = '自动交易状态: 运行中';
            } else {
                tradingStatus.className = 'status-indicator status-offline';
                tradingStatusText.textContent = '自动交易状态: 已停止';
            }

            // 更新持仓列表
            updatePositionsTable(data.positions);

            // 更新风险状态
            if (data.risk_status) {
                updateRiskStatus(data.risk_status);
            }
        }

        // 更新持仓表格
        function updatePositionsTable(positions) {
            const tbody = document.getElementById('positionsTable');
            if (!positions || positions.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align: center; color: #6b7280;">暂无持仓</td></tr>';
                return;
            }

            tbody.innerHTML = positions.map(pos => `
                <tr>
                    <td>${pos.symbol}</td>
                    <td><span class="badge badge-${pos.side.toLowerCase()}">${pos.side}</span></td>
                    <td>${pos.contracts.toFixed(4)}</td>
                    <td>$${pos.entry_price.toFixed(2)}</td>
                    <td>$${pos.mark_price.toFixed(2)}</td>
                    <td class="${pos.unrealized_pnl >= 0 ? 'positive' : 'negative'}">
                        ${pos.unrealized_pnl >= 0 ? '+' : ''}${pos.unrealized_pnl.toFixed(2)}
                    </td>
                    <td>${pos.leverage}x</td>
                    <td>
                        <button class="btn btn-danger" style="padding: 6px 12px; font-size: 12px;" 
                                onclick="closePosition('${pos.symbol}')">平仓</button>
                    </td>
                </tr>
            `).join('');
        }

        // 更新风险状态
        function updateRiskStatus(status) {
            document.getElementById('tradingEnabled').textContent = status.trading_enabled ? '✅ 启用' : '❌ 禁用';
            document.getElementById('dailyTrades').textContent = `${status.daily_trades} 笔`;
            document.getElementById('dailyPnl').textContent = (status.daily_pnl || 0).toFixed(2) + ' USDT';
            document.getElementById('dailyPnl').className = 'stat-value ' + ((status.daily_pnl || 0) >= 0 ? 'positive' : 'negative');
            document.getElementById('stopLossPercent').textContent = status.stop_loss_percent + '%';
            document.getElementById('takeProfitPercent').textContent = status.take_profit_percent + '%';
            document.getElementById('trailingStopPercent').textContent = status.trailing_stop_percent + '%';
        }

        // 更新K线图表
        async function updateChart() {
            const symbol = document.getElementById('chartSymbol').value;
            const timeframe = document.getElementById('chartTimeframe').value;
            
            try {
                // 这里应该调用API获取K线数据
                // 模拟数据用于演示
                const response = await fetch(`/api/ohlcv?symbol=${symbol}&timeframe=${timeframe}`);
                if (response.ok) {
                    const data = await response.json();
                    if (data.success) {
                        renderCandlestickChart(data.data);
                    }
                }
            } catch (e) {
                console.log('使用模拟数据渲染图表');
                renderCandlestickChart(generateMockData());
            }
        }

        // 生成模拟K线数据
        function generateMockData() {
            const data = [];
            let price = 45000;
            const now = new Date();
            
            for (let i = 100; i >= 0; i--) {
                const time = new Date(now.getTime() - i * 3600000);
                const open = price;
                const change = (Math.random() - 0.5) * 500;
                const close = open + change;
                const high = Math.max(open, close) + Math.random() * 200;
                const low = Math.min(open, close) - Math.random() * 200;
                const volume = Math.random() * 1000 + 500;
                
                data.push({
                    time: time.toISOString(),
                    open: open,
                    high: high,
                    low: low,
                    close: close,
                    volume: volume
                });
                
                price = close;
            }
            
            return data;
        }

        // 渲染K线图
        function renderCandlestickChart(data) {
            const times = data.map(d => d.time);
            const opens = data.map(d => d.open);
            const highs = data.map(d => d.high);
            const lows = data.map(d => d.low);
            const closes = data.map(d => d.close);
            const volumes = data.map(d => d.volume);

            const trace = {
                x: times,
                open: opens,
                high: highs,
                low: lows,
                close: closes,
                type: 'candlestick',
                name: 'K线',
                increasing: {line: {color: '#48bb78'}, fillcolor: '#48bb78'},
                decreasing: {line: {color: '#f56565'}, fillcolor: '#f56565'}
            };

            const volumeTrace = {
                x: times,
                y: volumes,
                type: 'bar',
                name: '成交量',
                yaxis: 'y2',
                marker: {
                    color: closes.map((c, i) => c >= opens[i] ? '#48bb78' : '#f56565')
                }
            };

            const layout = {
                paper_bgcolor: 'transparent',
                plot_bgcolor: '#0d1117',
                font: {color: '#e0e0e0'},
                xaxis: {
                    gridcolor: '#2d3748',
                    rangeslider: {visible: false}
                },
                yaxis: {
                    title: '价格',
                    gridcolor: '#2d3748',
                    side: 'right'
                },
                yaxis2: {
                    title: '成交量',
                    overlaying: 'y',
                    side: 'left',
                    showgrid: false
                },
                grid: {rows: 1, columns: 1},
                showlegend: false,
                margin: {t: 30, b: 30, l: 50, r: 50}
            };

            Plotly.newPlot('candlestickChart', [trace, volumeTrace], layout, {responsive: true});
        }

        // 控制函数
        async function startTrading() {
            try {
                const response = await fetch('/api/trading/start', {method: 'POST'});
                const data = await response.json();
                if (data.success) {
                    addLog('交易', '自动交易已启动', 'info');
                } else {
                    addLog('错误', data.error || '启动失败', 'error');
                }
            } catch (e) {
                addLog('错误', '启动请求失败', 'error');
            }
        }

        async function stopTrading() {
            try {
                const response = await fetch('/api/trading/stop', {method: 'POST'});
                const data = await response.json();
                if (data.success) {
                    addLog('交易', '自动交易已停止', 'warning');
                }
            } catch (e) {
                addLog('错误', '停止请求失败', 'error');
            }
        }

        async function emergencyStop() {
            if (!confirm('确定要执行紧急停止吗？这将平掉所有持仓！')) {
                return;
            }
            try {
                const response = await fetch('/api/trading/emergency_stop', {method: 'POST'});
                const data = await response.json();
                if (data.success) {
                    addLog('紧急', '紧急停止已执行，所有持仓已平仓', 'error');
                }
            } catch (e) {
                addLog('错误', '紧急停止请求失败', 'error');
            }
        }

        async function closePosition(symbol) {
            if (!confirm(`确定要平仓 ${symbol} 吗？`)) {
                return;
            }
            try {
                const response = await fetch('/api/position/close', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({symbol: symbol})
                });
                const data = await response.json();
                if (data.success) {
                    addLog('交易', `${symbol} 平仓成功`, 'info');
                } else {
                    addLog('错误', data.error || '平仓失败', 'error');
                }
            } catch (e) {
                addLog('错误', '平仓请求失败', 'error');
            }
        }

        async function refreshData() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();
                if (data.success) {
                    updateDashboard(data.data);
                    addLog('系统', '数据已刷新', 'info');
                }
            } catch (e) {
                addLog('错误', '刷新数据失败', 'error');
            }
        }

        // 添加日志
        function addLog(source, message, type) {
            const container = document.getElementById('logContainer');
            const time = new Date().toLocaleTimeString();
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `
                <span class="log-time">[${time}]</span>
                <span class="log-${type}">[${source}] ${message}</span>
            `;
            container.insertBefore(entry, container.firstChild);
            
            // 限制日志数量
            while (container.children.length > 100) {
                container.removeChild(container.lastChild);
            }
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            refreshData();
            updateChart();
            
            // 定期刷新图表
            setInterval(updateChart, 30000);
        });
    </script>
</body>
</html>
