<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>交易记录 - 自动化交易生存指南-量化交易系统</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f1419;
            color: #e0e0e0;
            min-height: 100vh;
            padding-top: 130px;
        }
        
        .header {
            background: linear-gradient(135deg, #1a1f2e 0%, #2d3748 100%);
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
        }
        
        .header h1 {
            font-size: 24px;
            color: #4fd1c5;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .connection-status {
            padding: 8px 16px;
            background: rgba(45, 55, 72, 0.8);
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
        }
        
        .nav {
            display: flex;
            gap: 20px;
            margin-top: 15px;
        }
        
        .nav a {
            color: #a0aec0;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 6px;
            transition: all 0.3s;
        }
        
        .nav a:hover, .nav a.active {
            background: #4fd1c5;
            color: #1a1f2e;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .card {
            background: #1a1f2e;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            border: 1px solid #2d3748;
            margin-bottom: 20px;
        }
        
        .card h3 {
            color: #4fd1c5;
            margin-bottom: 15px;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: #0d1117;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #2d3748;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .stat-label {
            color: #a0aec0;
            font-size: 11px;
            text-transform: uppercase;
        }
        
        .stat-sub {
            font-size: 10px;
            color: #718096;
            margin-top: 3px;
        }
        
        /* 交易统计颜色：正数红色，负数绿色（与币安保持一致） */
        .positive { color: #f56565; }
        .negative { color: #48bb78; }
        .neutral { color: #ed8936; }
        
        /* 盈利曲线 */
        .equity-chart-container {
            height: 350px;
            margin-top: 15px;
        }
        
        /* 交易历史卡片 */
        .trades-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .trades-header h3 {
            margin: 0;
        }
        
        /* 筛选栏 - 嵌入交易历史 */
        .filters-inline {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .filters-inline select, 
        .filters-inline input {
            padding: 8px 12px;
            background: #2d3748;
            border: 1px solid #4a5568;
            border-radius: 6px;
            color: #e0e0e0;
            font-size: 13px;
            min-width: 120px;
        }
        
        .filters-inline input[type="date"] {
            min-width: 140px;
        }
        
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s;
            background: #4fd1c5;
            color: #1a1f2e;
        }
        
        .btn:hover {
            background: #38b2ac;
        }
        
        .btn-secondary {
            background: #4a5568;
            color: #e0e0e0;
        }
        
        .btn-secondary:hover {
            background: #2d3748;
        }
        
        /* 交易表格样式 */
        .table-container {
            overflow-x: auto;
            border-radius: 8px;
            border: 1px solid #2d3748;
        }
        
        .trades-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            background: #0d1117;
        }
        
        .trades-table th {
            padding: 14px 12px;
            text-align: left;
            background: #1a2332;
            color: #4fd1c5;
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 2px solid #2d3748;
            white-space: nowrap;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        .trades-table td {
            padding: 12px;
            border-bottom: 1px solid #1e293b;
            color: #e0e0e0;
            vertical-align: middle;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-weight: 400;
        }
        
        .trades-table tr:nth-child(even) {
            background: #111820;
        }
        
        .trades-table tr:hover {
            background: #1e293b;
        }
        
        /* 数字列样式 - 统一使用系统字体 */
        .num {
            text-align: right !important;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-variant-numeric: tabular-nums;
        }
        
        .trades-table th.num {
            text-align: right !important;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        /* 方向标签 - BUY绿色，SELL红色 */
        .side-tag {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .side-buy {
            background: rgba(72, 187, 120, 0.2);
            color: #48bb78;
        }
        
        .side-sell {
            background: rgba(245, 101, 101, 0.2);
            color: #f56565;
        }
        
        /* 盈亏样式 - 正数红色，负数绿色（币安风格） */
        .pnl-positive {
            color: #f56565;
            font-weight: 600;
        }
        
        .pnl-negative {
            color: #48bb78;
            font-weight: 600;
        }
        
        /* 分页 */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
            align-items: center;
        }
        
        .pagination button {
            padding: 8px 16px;
            background: #2d3748;
            border: 1px solid #4a5568;
            color: #e0e0e0;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
        }
        
        .pagination button:hover:not(:disabled) {
            background: #4a5568;
        }
        
        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .page-info {
            color: #a0aec0;
            font-size: 13px;
        }
        
        /* 状态指示器 */
        .status-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }
        .status-online {
            background: #48bb78;
            box-shadow: 0 0 8px #48bb78;
        }
        .status-offline {
            background: #f56565;
            box-shadow: 0 0 8px #f56565;
        }
        
        .version {
            font-size: 14px;
            color: #a0aec0;
            font-weight: normal;
        }
        
        /* 空数据提示 */
        .empty-state {
            text-align: center;
            color: #6b7280;
            padding: 60px 20px;
        }
        
        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-top">
            <h1>📈 自动化交易生存指南-量化交易系统 <span class="version">v1.0</span></h1>
            <div class="connection-status">
                <span class="status-indicator status-offline" id="connectionStatus"></span>
                <span id="connectionText">连接中...</span>
            </div>
        </div>
        <nav class="nav">
            <a href="/">仪表盘</a>
            <a href="/trades" class="active">交易记录</a>
            <a href="/signals">信号监控</a>
            <a href="/settings">设置</a>
        </nav>
    </header>

    <div class="container">
        <!-- 交易统计 -->
        <div class="card">
            <h3>📊 交易统计</h3>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="totalTrades">--</div>
                    <div class="stat-label">总交易次数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="winRate">--</div>
                    <div class="stat-label">胜率</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="totalProfit">--</div>
                    <div class="stat-label">总盈亏 (USDT)</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="avgProfit">--</div>
                    <div class="stat-label">平均盈亏 (USDT)</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="totalFee">--</div>
                    <div class="stat-label">总手续费 (USDT)</div>
                </div>
            </div>
        </div>

        <!-- 盈利曲线 -->
        <div class="card">
            <h3>📈 盈利曲线</h3>
            <div class="stats-grid" style="margin-bottom: 15px;">
                <div class="stat-card">
                    <div class="stat-value" id="equityTotalReturn">--</div>
                    <div class="stat-label">总收益率</div>
                    <div class="stat-sub" id="equityTotalReturnUsd">--</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="equityMaxDrawdown">--</div>
                    <div class="stat-label">最大回撤</div>
                    <div class="stat-sub" id="equityMaxDrawdownUsd">--</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="equityTotalTrades">--</div>
                    <div class="stat-label">总交易</div>
                    <div class="stat-sub" id="equityWinTrades">--</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="equityProfitFactor">--</div>
                    <div class="stat-label">盈利因子</div>
                    <div class="stat-sub">Profit Factor</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="equitySharpe">--</div>
                    <div class="stat-label">夏普比率</div>
                    <div class="stat-sub">Sharpe Ratio</div>
                </div>
            </div>
            <div id="equityChart" class="equity-chart-container"></div>
        </div>

        <!-- 交易历史 -->
        <div class="card">
            <div class="trades-header">
                <h3>📜 交易历史</h3>
                <!-- 筛选栏嵌入在这里 -->
                <div class="filters-inline">
                    <select id="filterSymbol">
                        <option value="">所有交易对</option>
                    </select>
                    <select id="filterSide">
                        <option value="">所有方向</option>
                        <option value="BUY">买入</option>
                        <option value="SELL">卖出</option>
                    </select>
                    <select id="filterPnl">
                        <option value="">所有盈亏</option>
                        <option value="profit">盈利</option>
                        <option value="loss">亏损</option>
                    </select>
                    <input type="date" id="filterDateStart" placeholder="开始日期">
                    <input type="date" id="filterDateEnd" placeholder="结束日期">
                    <button class="btn" onclick="applyFilters()">筛选</button>
                    <button class="btn btn-secondary" onclick="resetFilters()">重置</button>
                </div>
            </div>
            
            <div class="table-container">
                <table class="trades-table">
                    <thead>
                        <tr>
                            <th>时间</th>
                            <th>交易对</th>
                            <th>方向</th>
                            <th class="num">价格</th>
                            <th class="num">数量</th>
                            <th class="num">金额</th>
                            <th class="num">手续费</th>
                            <th class="num">已实现利润</th>
                        </tr>
                    </thead>
                    <tbody id="tradesTable">
                        <tr>
                            <td colspan="8" class="empty-state">
                                <div class="empty-state-icon">📊</div>
                                <div>加载中...</div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            
            <div class="pagination">
                <button onclick="prevPage()" id="prevBtn">上一页</button>
                <span class="page-info" id="pageInfo">第 1 页</span>
                <button onclick="nextPage()" id="nextBtn">下一页</button>
            </div>
        </div>
    </div>

    <script>
        // 数据存储
        let allTradesData = [];
        let filteredTradesData = [];
        let currentPage = 1;
        const itemsPerPage = 20;
        let equityChart = null;
        let equitySeries = null;

        // 加载交易数据
        async function loadTrades() {
            try {
                const response = await fetch('/api/trades/fills?page=1&page_size=1000');
                const data = await response.json();

                if (data.success) {
                    allTradesData = data.data.items || [];
                    filteredTradesData = [...allTradesData];
                    
                    // 更新交易对筛选下拉框
                    updateSymbolFilter();
                    
                    // 更新统计
                    updateStats();
                    
                    // 渲染盈利曲线
                    renderEquityCurve();
                    
                    // 渲染表格
                    renderTable();
                } else {
                    document.getElementById('tradesTable').innerHTML = `
                        <tr><td colspan="8" class="empty-state">
                            <div class="empty-state-icon">❌</div>
                            <div>加载失败: ${data.error}</div>
                        </td></tr>
                    `;
                }
            } catch (e) {
                document.getElementById('tradesTable').innerHTML = `
                    <tr><td colspan="8" class="empty-state">
                        <div class="empty-state-icon">❌</div>
                        <div>加载失败: ${e.message}</div>
                    </td></tr>
                `;
            }
        }

        // 更新交易对筛选下拉框
        function updateSymbolFilter() {
            const symbols = [...new Set(allTradesData.map(t => t.symbol))].sort();
            const select = document.getElementById('filterSymbol');
            select.innerHTML = '<option value="">所有交易对</option>';
            symbols.forEach(symbol => {
                select.innerHTML += `<option value="${symbol}">${symbol}</option>`;
            });
        }

        // 更新统计
        function updateStats() {
            const total = filteredTradesData.length;
            
            // 计算盈亏统计
            const profitable = filteredTradesData.filter(t => (t.realized_pnl || 0) > 0);
            const losing = filteredTradesData.filter(t => (t.realized_pnl || 0) < 0);
            
            const winRate = total > 0 ? ((profitable.length / total) * 100).toFixed(1) : 0;
            const totalProfit = filteredTradesData.reduce((sum, t) => sum + (t.realized_pnl || 0), 0);
            const avgProfit = total > 0 ? (totalProfit / total).toFixed(2) : 0;
            const totalFee = filteredTradesData.reduce((sum, t) => sum + (t.fee || 0), 0);

            document.getElementById('totalTrades').textContent = total;
            document.getElementById('winRate').textContent = winRate + '%';
            // 胜率颜色：高于50%显示红色（表示好的表现）
            document.getElementById('winRate').className = 'stat-value ' + (winRate >= 50 ? 'positive' : 'negative');
            
            document.getElementById('totalProfit').textContent = (totalProfit >= 0 ? '+' : '') + totalProfit.toFixed(2);
            document.getElementById('totalProfit').className = 'stat-value ' + (totalProfit >= 0 ? 'positive' : 'negative');
            
            document.getElementById('avgProfit').textContent = (avgProfit >= 0 ? '+' : '') + avgProfit;
            document.getElementById('avgProfit').className = 'stat-value ' + (avgProfit >= 0 ? 'positive' : 'negative');
            
            document.getElementById('totalFee').textContent = totalFee.toFixed(4);
            document.getElementById('totalFee').className = 'stat-value neutral';
        }

        // 渲染盈利曲线和统计
        function renderEquityCurve() {
            if (!filteredTradesData || filteredTradesData.length === 0) return;

            // 按时间正序排列
            const sortedTrades = [...filteredTradesData].sort((a, b) => 
                new Date(a.executed_at) - new Date(b.executed_at)
            );
            
            // 计算累计盈亏数据
            let cumulativePnl = 0;
            const equityData = sortedTrades.map(trade => {
                cumulativePnl += (trade.realized_pnl || 0);
                // 使用UTC时间戳，格式化为YYYY-MM-DD
                const date = new Date(trade.executed_at);
                const year = date.getUTCFullYear();
                const month = String(date.getUTCMonth() + 1).padStart(2, '0');
                const day = String(date.getUTCDate()).padStart(2, '0');
                const timeStr = `${year}-${month}-${day}`;
                return {
                    time: timeStr,
                    value: parseFloat(cumulativePnl.toFixed(2))
                };
            });

            // 计算统计数据
            const initialCapital = 1000; // 假设初始资金
            const finalEquity = initialCapital + cumulativePnl;
            const totalReturn = ((finalEquity - initialCapital) / initialCapital * 100).toFixed(2);
            
            // 计算最大回撤
            let maxDrawdown = 0;
            let maxDrawdownUsd = 0;
            let peakEquity = initialCapital;
            let runningEquity = initialCapital;
            
            sortedTrades.forEach(trade => {
                runningEquity += (trade.realized_pnl || 0);
                if (runningEquity > peakEquity) {
                    peakEquity = runningEquity;
                }
                const drawdown = (peakEquity - runningEquity) / peakEquity * 100;
                const drawdownUsd = peakEquity - runningEquity;
                if (drawdown > maxDrawdown) {
                    maxDrawdown = drawdown;
                    maxDrawdownUsd = drawdownUsd;
                }
            });

            // 计算盈利因子
            const grossProfit = sortedTrades.filter(t => (t.realized_pnl || 0) > 0).reduce((sum, t) => sum + (t.realized_pnl || 0), 0);
            const grossLoss = Math.abs(sortedTrades.filter(t => (t.realized_pnl || 0) < 0).reduce((sum, t) => sum + (t.realized_pnl || 0), 0));
            const profitFactor = grossLoss > 0 ? (grossProfit / grossLoss).toFixed(2) : grossProfit > 0 ? '∞' : '0.00';

            // 计算夏普比率（简化版）
            const returns = sortedTrades.map(t => (t.realized_pnl || 0));
            const avgReturn = returns.reduce((a, b) => a + b, 0) / returns.length;
            const variance = returns.reduce((sum, r) => sum + Math.pow(r - avgReturn, 2), 0) / returns.length;
            const stdDev = Math.sqrt(variance);
            const sharpeRatio = stdDev > 0 ? ((avgReturn / stdDev) * Math.sqrt(365)).toFixed(3) : '0.000';

            // 更新统计显示
            const totalTrades = sortedTrades.length;
            const winTrades = sortedTrades.filter(t => (t.realized_pnl || 0) > 0).length;
            
            document.getElementById('equityTotalReturn').textContent = (totalReturn >= 0 ? '+' : '') + totalReturn + '%';
            document.getElementById('equityTotalReturn').className = 'stat-value ' + (totalReturn >= 0 ? 'positive' : 'negative');
            document.getElementById('equityTotalReturnUsd').textContent = (cumulativePnl >= 0 ? '+' : '') + cumulativePnl.toFixed(2) + ' USD';
            document.getElementById('equityTotalReturnUsd').className = 'stat-sub ' + (cumulativePnl >= 0 ? 'positive' : 'negative');
            
            document.getElementById('equityMaxDrawdown').textContent = '-' + maxDrawdown.toFixed(2) + '%';
            document.getElementById('equityMaxDrawdown').className = 'stat-value negative';
            document.getElementById('equityMaxDrawdownUsd').textContent = '-' + maxDrawdownUsd.toFixed(2) + ' USD';
            document.getElementById('equityMaxDrawdownUsd').className = 'stat-sub negative';
            
            document.getElementById('equityTotalTrades').textContent = totalTrades;
            document.getElementById('equityWinTrades').textContent = winTrades + ' 盈 / ' + (totalTrades - winTrades) + ' 亏';
            
            document.getElementById('equityProfitFactor').textContent = profitFactor;
            document.getElementById('equityProfitFactor').className = 'stat-value ' + (parseFloat(profitFactor) >= 1.5 ? 'positive' : parseFloat(profitFactor) >= 1 ? 'neutral' : 'negative');
            
            document.getElementById('equitySharpe').textContent = sharpeRatio;
            document.getElementById('equitySharpe').className = 'stat-value ' + (parseFloat(sharpeRatio) >= 1 ? 'positive' : parseFloat(sharpeRatio) >= 0 ? 'neutral' : 'negative');

            // 初始化或更新图表
            if (!equityChart) {
                initEquityChart();
            }

            if (equitySeries) {
                equitySeries.setData(equityData);
                equityChart.timeScale().fitContent();
            }
        }

        function initEquityChart() {
            const chartContainer = document.getElementById('equityChart');
            
            // 确保容器有明确的宽高
            const width = chartContainer.clientWidth || chartContainer.offsetWidth || 800;
            const height = 350;
            
            equityChart = LightweightCharts.createChart(chartContainer, {
                width: width,
                height: height,
                layout: {
                    background: { color: '#0d1117' },
                    textColor: '#e0e0e0',
                },
                grid: {
                    vertLines: { color: '#2d3748' },
                    horzLines: { color: '#2d3748' },
                },
                crosshair: {
                    mode: LightweightCharts.CrosshairMode.Normal,
                },
                rightPriceScale: {
                    borderColor: '#2d3748',
                    autoScale: true,
                },
                timeScale: {
                    borderColor: '#2d3748',
                    timeVisible: true,
                    secondsVisible: false,
                },
            });

            equitySeries = equityChart.addAreaSeries({
                topColor: 'rgba(79, 209, 197, 0.4)',
                bottomColor: 'rgba(79, 209, 197, 0.05)',
                lineColor: '#4fd1c5',
                lineWidth: 2,
            });

            window.addEventListener('resize', () => {
                const newWidth = chartContainer.clientWidth || chartContainer.offsetWidth || 800;
                equityChart.applyOptions({
                    width: newWidth,
                    height: height,
                });
            });
        }

        // 渲染表格
        function renderTable() {
            const tbody = document.getElementById('tradesTable');
            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const pageData = filteredTradesData.slice(start, end);

            if (pageData.length === 0) {
                tbody.innerHTML = `
                    <tr><td colspan="8" class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <div>暂无数据</div>
                    </td></tr>
                `;
                return;
            }

            tbody.innerHTML = pageData.map(trade => {
                const date = new Date(trade.executed_at);
                const pnl = trade.realized_pnl || 0;
                const amount = trade.quantity * trade.price;
                const fee = trade.fee || 0;
                const sideClass = trade.side === 'BUY' ? 'side-buy' : 'side-sell';
                const pnlClass = pnl >= 0 ? 'pnl-positive' : 'pnl-negative';

                return `
                    <tr>
                        <td>${date.toLocaleString()}</td>
                        <td><strong>${trade.symbol}</strong></td>
                        <td><span class="side-tag ${sideClass}">${trade.side}</span></td>
                        <td class="num">$${trade.price.toFixed(4)}</td>
                        <td class="num">${trade.quantity.toFixed(4)}</td>
                        <td class="num">$${amount.toFixed(2)}</td>
                        <td class="num">$${fee.toFixed(4)}</td>
                        <td class="num ${pnlClass}">${pnl >= 0 ? '+' : ''}${pnl.toFixed(2)}</td>
                    </tr>
                `;
            }).join('');

            const totalPages = Math.max(1, Math.ceil(filteredTradesData.length / itemsPerPage));
            document.getElementById('pageInfo').textContent = `第 ${currentPage} / ${totalPages} 页`;
            document.getElementById('prevBtn').disabled = currentPage === 1;
            document.getElementById('nextBtn').disabled = end >= filteredTradesData.length;
        }

        // 分页
        function prevPage() {
            if (currentPage > 1) {
                currentPage--;
                renderTable();
            }
        }

        function nextPage() {
            if (currentPage * itemsPerPage < filteredTradesData.length) {
                currentPage++;
                renderTable();
            }
        }

        // 筛选
        function applyFilters() {
            const symbol = document.getElementById('filterSymbol').value;
            const side = document.getElementById('filterSide').value;
            const pnlType = document.getElementById('filterPnl').value;
            const dateStart = document.getElementById('filterDateStart').value;
            const dateEnd = document.getElementById('filterDateEnd').value;

            filteredTradesData = allTradesData.filter(trade => {
                if (symbol && trade.symbol !== symbol) return false;
                if (side && trade.side !== side) return false;
                if (pnlType === 'profit' && !(trade.realized_pnl > 0)) return false;
                if (pnlType === 'loss' && !(trade.realized_pnl < 0)) return false;
                
                const tradeDate = new Date(trade.executed_at);
                if (dateStart) {
                    const start = new Date(dateStart);
                    start.setHours(0, 0, 0, 0);
                    if (tradeDate < start) return false;
                }
                if (dateEnd) {
                    const end = new Date(dateEnd);
                    end.setHours(23, 59, 59, 999);
                    if (tradeDate > end) return false;
                }
                
                return true;
            });

            currentPage = 1;
            updateStats();
            renderEquityCurve();
            renderTable();
        }

        function resetFilters() {
            document.getElementById('filterSymbol').value = '';
            document.getElementById('filterSide').value = '';
            document.getElementById('filterPnl').value = '';
            document.getElementById('filterDateStart').value = '';
            document.getElementById('filterDateEnd').value = '';
            filteredTradesData = [...allTradesData];
            currentPage = 1;
            updateStats();
            renderEquityCurve();
            renderTable();
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            loadTrades();
        });
    </script>
</body>
</html>
